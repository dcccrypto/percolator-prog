name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: 8388608

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Build (lib)
        run: cargo build --lib --verbose
      - name: Build (devnet)
        run: cargo build --lib --features devnet --verbose
      - name: Build (mainnet)
        run: cargo build --lib --features mainnet --verbose
      # Note: unit/integration tests require LiteSVM + a built .so binary
      # (cargo-build-sbf). Run locally or in a dedicated SBF CI job.
      # Kani proofs require the Kani verifier. Run via `cargo kani`.

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Clippy
        run: cargo clippy --lib -- -W clippy::all

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: rustfmt
      - name: Format check
        run: cargo fmt --check

  kani:
    name: Kani Proofs (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Shard 1: kani_ trade/matcher/decide/cmor/universal (~80 proofs)
          - shard: "1-trade"
            args: >-
              --tests --output-format terse --jobs 4
              --harness kani_tradecpi
              --harness kani_tradenocpi
              --harness kani_trade_rejects
              --harness kani_matcher
              --harness kani_decide
              --harness kani_cmor
              --harness kani_universal
          # Shard 2: kani_ everything else (~85 proofs)
          - shard: "2-core"
            args: >-
              --tests --output-format terse --jobs 4
              --harness kani_scale
              --harness kani_u64max
              --harness kani_tranche
              --harness kani_oracle
              --harness kani_statemachine
              --harness kani_pyth
              --harness kani_crank
              --harness kani_concurrency
              --harness kani_vram
              --harness kani_selfliq
              --harness kani_quadratic
              --harness kani_invert
              --harness kani_init
              --harness kani_clamp
              --harness kani_base
              --harness kani_units
              --harness kani_sweep
              --harness kani_reclaim
              --harness kani_lp
              --harness kani_decimals
              --harness kani_withdraw
              --harness kani_sandwich
              --harness kani_nonce
              --harness kani_hyperp
              --harness kani_gate
              --harness kani_dust
              --harness kani_admin
              --harness kani_slab
              --harness kani_single
              --harness kani_set
              --harness kani_pda
              --harness kani_owner
              --harness kani_isqrt
              --harness kani_fee
              --harness kani_unit_conversion
              --harness kani_renounce
              --harness kani_new
              --harness kani_min
              --harness kani_len
              --harness kani_ema
              --harness kani_cpi
              --harness kani_cb
              --harness kani_audit
              --harness kani_accumulate
              --harness kani_abi
          # Shard 3: proof_* + inductive_* harnesses (~45 proofs)
          - shard: "3-proof"
            args: >-
              --tests --output-format terse --jobs 4
              --harness proof_
              --harness inductive_
    # Slow harnesses (nightly_* prefix) are excluded here and run in nightly.yml.
    # Split into 3 parallel shards to keep each under 25min wall time.
    # Total suite was ~55-60min sequential; parallel cuts to ~20min per shard.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run Kani proofs (shard ${{ matrix.shard }})
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          args: ${{ matrix.args }}
        timeout-minutes: 40
