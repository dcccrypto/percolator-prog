name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: 8388608

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Build (lib)
        run: cargo build --lib --verbose
      - name: Build (devnet)
        run: cargo build --lib --features devnet --verbose
      - name: Build (mainnet)
        run: cargo build --lib --features mainnet --verbose
      # Note: unit/integration tests require LiteSVM + a built .so binary
      # (cargo-build-sbf). Run locally or in a dedicated SBF CI job.
      # Kani proofs require the Kani verifier. Run via `cargo kani`.

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Clippy
        run: cargo clippy --lib -- -W clippy::all

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: rustfmt
      - name: Format check
        run: cargo fmt --check

  kani:
    name: Kani Proofs
    runs-on: ubuntu-latest
    # Slow harnesses (nightly_* prefix) are excluded here and run in nightly.yml.
    # The most expensive harness (nightly_fee_monotone_in_bps) took 2h29m+ and
    # previously caused this job to hit the 3h wall. PR CI now runs only
    # harnesses prefixed with `kani_` (fast proofs, each <30 min).
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run Kani proofs (PR — fast harnesses only)
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          args: --tests --output-format terse --jobs 4 --harness kani_
        timeout-minutes: 175
