name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: 8388608

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Build (lib)
        run: cargo build --lib --verbose
      - name: Build (devnet)
        run: cargo build --lib --features devnet --verbose
      - name: Build (mainnet)
        run: cargo build --lib --features mainnet --verbose
      # Note: unit/integration tests require LiteSVM + a built .so binary
      # (cargo-build-sbf). Run locally or in a dedicated SBF CI job.
      # Kani proofs require the Kani verifier. Run via `cargo kani`.

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Clippy
        run: cargo clippy --lib -- -W clippy::all

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: rustfmt
      - name: Format check
        run: cargo fmt --check

  kani:
    name: Kani Proofs
    runs-on: ubuntu-latest
    # Slow harnesses (nightly_* prefix) are excluded here and run in nightly.yml.
    # Currently excluded (renamed to nightly_*):
    #   nightly_fee_monotone_in_bps                     (~2h29m — SAT-hard u128)
    #   nightly_fee_ceil_geq_floor                      (~slow fee SAT)
    #   nightly_fee_monotone_in_notional                (~slow fee SAT)
    #   nightly_cb_recovery_equilibrium_stable          (~97m+ — SAT-hard CB proof)
    #   nightly_cb_recovery_distance_decreases          (~slow CB convergence)
    #   nightly_fee_bounded_by_notional                 (~29m — u128 SAT)
    #   nightly_sandwich_full_cap_allows_double         (~slow OI cap proof)
    #   nightly_ramp_never_exceeds_configured_multiplier (~slow ramp SAT)
    #   nightly_ramp_monotonically_increases            (~slow ramp proof)
    #   nightly_skew_adjusted_cap_never_exceeds_base_cap (~slow OI cap)
    #   nightly_median_single_price                     (~2h45m — symbolic sort, 5-element array)
    # All remaining kani_*, proof_*, and inductive_* harnesses run here — each expected <30 min.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run Kani proofs (PR — all fast harnesses, exclude nightly_*)
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          args: --tests --output-format terse --jobs 4 --harness kani_ --harness proof_ --harness inductive_
        timeout-minutes: 175
