name: Kani (Manual)

# Kani was removed from push/PR CI and nightly runs (too slow for CI).
# This workflow allows manual on-demand runs from the Actions tab.
# Run before merging any PR that touches math, proof logic, or invariant code.

on:
  workflow_dispatch:
    inputs:
      harness:
        description: 'Harness prefix to run (e.g. proof_, kani_, inductive_, or blank for all)'
        required: false
        default: 'proof_'

concurrency:
  group: kani-manual
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: 8388608

jobs:
  kani:
    name: Kani Proofs (On-Demand)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Kani harnesses
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          args: --tests --output-format terse --jobs 4 --harness ${{ github.event.inputs.harness || 'proof_' }}
        timeout-minutes: 175
