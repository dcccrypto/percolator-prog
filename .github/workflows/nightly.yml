name: Nightly Kani (Slow Proofs)

# Runs expensive Kani harnesses that are too slow for PR CI.
# Triggered nightly at 02:00 UTC and on manual dispatch.
# Harnesses prefixed with `nightly_` live in tests/kani.rs and are excluded
# from ci.yml (which runs kani_*, proof_*, and inductive_* harnesses).

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC every day
  workflow_dispatch:       # manual trigger from Actions tab

concurrency:
  group: nightly-kani
  cancel-in-progress: false  # Never cancel nightly; let it finish

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: 8388608

jobs:
  kani-nightly:
    name: Kani Proofs (Nightly — Slow Harnesses)
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5h ceiling — gives nightly_fee_monotone_in_bps room to complete
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run slow Kani harnesses (nightly_ prefix)
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          # --harness nightly_ uses prefix matching (same pattern as kani_, proof_, inductive_ in ci.yml).
          # The `.*` suffix broke matching — kani-github-action uses prefix/substring matching, not full regex.
          # Currently 18 slow harnesses: nightly_fee_monotone_in_bps (~2.5h), nightly_fee_monotone_in_notional,
          # nightly_fee_ceil_geq_floor, nightly_cb_recovery_*, nightly_fee_bounded_by_notional,
          # nightly_sandwich_impact_proportional, nightly_sandwich_full_cap_allows_double,
          # nightly_ramp_*, nightly_skew_adjusted_cap_*,
          # nightly_median_within_bounds, nightly_median_single_price (unwind(1)), nightly_circuit_breaker_before_ema,
          # nightly_decimals_9_to_0_scales_down (~2h41m — full u64 range SAT),
          # nightly_sv_exits_after_duration (~3h+ — safety valve symbolic proof),
          # nightly_oracle_adversarial_max_clamped (~2h36m — circuit breaker SAT),
          # nightly_hwm_floor_correct_math (was proof_hwm_floor_correct_math — renamed to exclude from PR CI)
          # nightly_dust_single_deposit_conservation (~19min+ — symbolic u64×u128 mul SAT),
          # nightly_dust_two_deposits_conservation (~24min — three-variable u128 mul SAT)
          # nightly_proof_loyalty_applies_only_to_fee_income (~35min+ — symbolic u64 delta_epochs SAT)
          args: --tests --output-format terse --jobs 2 --harness nightly_
        timeout-minutes: 295
